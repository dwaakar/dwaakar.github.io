backend:
  name: github
  repo: dwaakar/dwaakar.github.io
  branch: main
  base_url: https://dwaakar-github-io.pages.dev
  auth_endpoint: /api/auth

media_folder: "images"
public_folder: "/images"

collections:

  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - name: "general"
        label: "Personal Info, Bio & Social Links"
        file: "content/settings.json"
        fields:
          - { label: "Full Name", name: "name", widget: "string" }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Phone", name: "phone", widget: "string", required: false }
          - { label: "Location", name: "location", widget: "string", required: false }
          - { label: "Profile Photo", name: "photo", widget: "image", required: false }
          - { label: "Bio (shown on hero)", name: "bio", widget: "text", required: false }
          - label: "Typing Taglines"
            name: "taglines"
            widget: "list"
            required: false
            field: { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Research Objective", name: "aboutResearchObjective", widget: "text", required: false }
          - label: "Research Interests"
            name: "researchInterests"
            widget: "list"
            required: false
            field: { label: "Interest", name: "interest", widget: "string" }
          - { label: "Professional Objective", name: "aboutProfessionalObjective", widget: "text", required: false }
          - label: "Professional Interests"
            name: "professionalInterests"
            widget: "list"
            required: false
            field: { label: "Interest", name: "interest", widget: "string" }
          - { label: "Academic CV (PDF)", name: "cvAcademic", widget: "file", required: false }
          - { label: "Professional CV (PDF)", name: "cvProfessional", widget: "file", required: false }
          - { label: "GitHub URL", name: "github", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Storygraph URL", name: "storygraph", widget: "string", required: false }
          - label: "Custom Social Links"
            name: "customSocials"
            widget: "list"
            required: false
            fields:
              - { label: "Platform Name", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Emoji Icon", name: "icon", widget: "string", default: "🔗" }

  - name: "education"
    label: "🎓 Education"
    folder: "content/education"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Degree Title", name: "title", widget: "string" }
      - { label: "Institution", name: "institution", widget: "string" }
      - { label: "Year", name: "year", widget: "string", required: false }
      - { label: "Grade / GPA", name: "grade", widget: "string", required: false }
      - { label: "Specialisation", name: "specialisation", widget: "string", required: false }
      - { label: "Thesis Title", name: "thesis", widget: "string", required: false }
      - label: "Key Coursework"
        name: "coursework"
        widget: "list"
        required: false
        field: { label: "Course", name: "course", widget: "string" }
      - { label: "Detail / Description", name: "body", widget: "markdown", required: false }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - label: "Image Gallery (up to 10)"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "src", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "Link", name: "link", widget: "string", required: false }
      - label: "Display Mode"
        name: "displayMode"
        widget: "select"
        options:
          - { label: "Popup only", value: "popup" }
          - { label: "Popup + Full Page", value: "fullpage" }
        default: "popup"
      - label: "── Popup Visibility ──"
        name: "popupVisLabel"
        widget: "hidden"
        default: ""
      - { label: "Show Cover Image", name: "showImage", widget: "boolean", default: true, required: false }
      - { label: "Show Gallery", name: "showGallery", widget: "boolean", default: true, required: false }
      - { label: "Show Description/Detail", name: "showDetail", widget: "boolean", default: true, required: false }
      - { label: "Show Coursework", name: "showCoursework", widget: "boolean", default: true, required: false }
      - { label: "Sort Order", name: "order", widget: "number", default: 99 }

  - name: "skills"
    label: "🛠️ Skills"
    files:
      - name: "skills"
        label: "Skill Groups"
        file: "content/skills.json"
        fields:
          - label: "Skill Groups"
            name: "items"
            widget: "list"
            fields:
              - { label: "Group Name", name: "group", widget: "string" }
              - label: "Skills"
                name: "items"
                widget: "list"
                field: { label: "Skill", name: "skill", widget: "string" }

  - name: "projects"
    label: "📁 Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Description", name: "shortDesc", widget: "text", required: false }
      - { label: "Full Detail", name: "body", widget: "markdown", required: false }
      - { label: "Year", name: "year", widget: "string", required: false }
      - { label: "Status / Role", name: "status", widget: "string", required: false }
      - { label: "Organisation / Institution", name: "organisation", widget: "string", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Research", value: "research" }
          - { label: "Community", value: "community" }
        default: "research"
      - label: "Filter Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - label: "Image Gallery (up to 10)"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "src", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "YouTube Video URL", name: "videoUrl", widget: "string", required: false }
      - label: "Downloadable Report"
        name: "report"
        widget: "object"
        required: false
        fields:
          - { label: "PDF File", name: "file", widget: "file", required: false }
          - { label: "Button Label", name: "label", widget: "string", default: "Download Report", required: false }
      - label: "Related Publications"
        name: "relatedPubs"
        widget: "list"
        required: false
        field: { label: "Publication", name: "pub", widget: "string" }
      - label: "Display Mode"
        name: "displayMode"
        widget: "select"
        options:
          - { label: "Popup only", value: "popup" }
          - { label: "Popup + Full Page", value: "fullpage" }
        default: "popup"
      - { label: "External Link", name: "link", widget: "string", required: false }
      - label: "── Popup Visibility ──"
        name: "popupVisLabel"
        widget: "hidden"
        default: ""
      - { label: "Show Cover Image", name: "showImage", widget: "boolean", default: true, required: false }
      - { label: "Show Gallery", name: "showGallery", widget: "boolean", default: true, required: false }
      - { label: "Show Description/Detail", name: "showDetail", widget: "boolean", default: true, required: false }
      - { label: "Show Video", name: "showVideo", widget: "boolean", default: true, required: false }
      - { label: "Show Report Download", name: "showReport", widget: "boolean", default: true, required: false }
      - { label: "Show Related Publications", name: "showRelatedPubs", widget: "boolean", default: true, required: false }
      - { label: "Sort Order", name: "order", widget: "number", default: 99 }

  - name: "publications"
    label: "📚 Publications"
    folder: "content/publications"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Authors", name: "authors", widget: "string", required: false }
      - { label: "Year", name: "year", widget: "string", required: false }
      - { label: "Journal / Book", name: "journal", widget: "string", required: false }
      - { label: "Publication Status", name: "status", widget: "string", required: false, hint: "e.g. Published, Under Review, Accepted, Submitted" }
      - { label: "Publication Type / Category", name: "category", widget: "string", required: false, hint: "e.g. Research Article, Book Chapter, Conference Paper, Policy Brief" }
      - { label: "DOI / URL", name: "doi", widget: "string", required: false }
      - { label: "Abstract", name: "abstract", widget: "text", required: false }
      - { label: "Detailed Overview", name: "body", widget: "markdown", required: false }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - label: "Image Gallery (up to 10)"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "src", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "External Link", name: "link", widget: "string", required: false }
      - label: "Display Mode"
        name: "displayMode"
        widget: "select"
        options:
          - { label: "Popup only", value: "popup" }
          - { label: "Popup + Full Page", value: "fullpage" }
        default: "popup"
      - label: "── Popup Visibility ──"
        name: "popupVisLabel"
        widget: "hidden"
        default: ""
      - { label: "Show Cover Image", name: "showImage", widget: "boolean", default: true, required: false }
      - { label: "Show Gallery/Figures", name: "showGallery", widget: "boolean", default: true, required: false }
      - { label: "Show Abstract", name: "showAbstract", widget: "boolean", default: true, required: false }
      - { label: "Show Detail/Overview", name: "showDetail", widget: "boolean", default: true, required: false }
      - { label: "Sort Order", name: "order", widget: "number", default: 99 }
