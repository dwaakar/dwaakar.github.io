<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project — Diwakar Adhikari</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:#f7f5f0;--bg2:#eeeae2;--surface:#ffffff;--border:#ddd9d0;
      --ink:#1a1814;--ink2:#5a5650;--accent:#2d6a4f;--accent2:#40916c;
      --gold:#b7832a;--tag-bg:#e8f5ee;--tag-ink:#1b4332;
      --radius:10px;--shadow:0 2px 16px rgba(0,0,0,0.07);
      --shadow-lg:0 8px 40px rgba(0,0,0,0.12);--nav-h:64px;
      --t:0.3s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="dark"]{
      --bg:#111410;--bg2:#1a1d17;--surface:#20241e;--border:#2e332b;
      --ink:#e8e4dc;--ink2:#9a9890;--accent:#52b788;--accent2:#74c69d;
      --gold:#d4a94a;--tag-bg:#1b3a2e;--tag-ink:#95d5b2;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;border:none;background:none;font-family:inherit}

    /* NAV */
    #navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1.5rem,5vw,4rem);background:var(--surface);box-shadow:var(--shadow)}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--ink)}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .back-btn{display:flex;align-items:center;gap:.5rem;font-size:.85rem;font-weight:500;color:var(--ink2);padding:.5rem 1rem;border:1.5px solid var(--border);border-radius:6px;transition:all var(--t)}
    .back-btn:hover{border-color:var(--accent);color:var(--accent)}
    .theme-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:1rem;transition:all var(--t);background:var(--surface)}
    .theme-btn:hover{border-color:var(--accent);color:var(--accent)}

    /* HERO */
    .project-hero{margin-top:var(--nav-h);position:relative;height:60vh;min-height:400px;overflow:hidden;background:var(--bg2)}
    .project-hero-img{width:100%;height:100%;object-fit:cover;object-position:center}
    .project-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.1) 60%,transparent 100%)}
    .project-hero-text{position:absolute;bottom:0;left:0;right:0;padding:3rem clamp(1.5rem,8vw,8rem);color:#fff}
    .project-hero-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg2),var(--tag-bg));font-size:4rem}

    /* CONTENT */
    .project-content{max-width:860px;margin:0 auto;padding:4rem clamp(1.5rem,5vw,5rem)}
    .project-meta-bar{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
    .project-year{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--ink2);letter-spacing:.08em}
    .project-status-badge{font-size:.75rem;padding:.25rem .7rem;border-radius:12px;background:var(--tag-bg);color:var(--tag-ink);font-weight:500}
    .project-tag{font-size:.75rem;padding:.2rem .6rem;border-radius:12px;background:var(--tag-bg);color:var(--tag-ink)}
    .project-title-main{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.2;color:var(--ink);margin-bottom:1rem}
    .project-short{font-size:1.1rem;color:var(--ink2);line-height:1.75;margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:1px solid var(--border)}

    /* DETAIL BODY */
    .project-detail{font-size:1rem;color:var(--ink2);line-height:1.85}
    .project-detail p{margin-bottom:1.2rem}
    .project-detail h1,.project-detail h2,.project-detail h3{font-family:'Playfair Display',serif;color:var(--ink);margin:2rem 0 .8rem}
    .project-detail h2{font-size:1.4rem}
    .project-detail h3{font-size:1.15rem}
    .project-detail ul,.project-detail ol{padding-left:1.5rem;margin-bottom:1.2rem}
    .project-detail li{margin-bottom:.4rem}
    .project-detail blockquote{border-left:3px solid var(--accent);padding:1rem 1.5rem;background:var(--bg2);border-radius:0 var(--radius) var(--radius) 0;margin:1.5rem 0;color:var(--ink2);font-style:italic}
    .project-detail strong{color:var(--ink)}
    .project-detail a{color:var(--accent);text-decoration:underline}

    /* VIDEO */
    .video-section{margin:3rem 0}
    .video-section h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--ink);margin-bottom:1rem}
    .video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--radius);box-shadow:var(--shadow-lg)}
    .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}

    /* GALLERY */
    .gallery-section{margin:3rem 0}
    .gallery-section h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--ink);margin-bottom:1rem}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem}
    .gallery-item{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;aspect-ratio:4/3}
    .gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform var(--t)}
    .gallery-item:hover img{transform:scale(1.04)}
    .gallery-caption{position:absolute;bottom:0;left:0;right:0;padding:.6rem .8rem;background:rgba(0,0,0,.6);color:#fff;font-size:.8rem;opacity:0;transition:opacity var(--t)}
    .gallery-item:hover .gallery-caption{opacity:1}

    /* LIGHTBOX */
    .lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--t)}
    .lightbox.open{opacity:1;pointer-events:all}
    .lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px}
    .lightbox-close{position:absolute;top:1.5rem;right:1.5rem;color:#fff;font-size:1.5rem;width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;transition:all var(--t)}
    .lightbox-close:hover{background:rgba(255,255,255,.1)}
    .lightbox-caption{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.8);font-size:.9rem;text-align:center}
    .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:1.5rem;width:48px;height:48px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;transition:all var(--t)}
    .lightbox-nav:hover{background:rgba(255,255,255,.1)}
    .lightbox-prev{left:1.5rem}
    .lightbox-next{right:1.5rem}

    /* REPORT */
    .report-section{margin:3rem 0}
    .report-btn{display:inline-flex;align-items:center;gap:.6rem;padding:1rem 1.8rem;background:var(--accent);color:#fff;border-radius:8px;font-size:.95rem;font-weight:500;transition:all var(--t)}
    .report-btn:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(45,106,79,.3)}

    /* RELATED PUBS */
    .related-section{margin:3rem 0;padding:2rem;background:var(--bg2);border-radius:var(--radius)}
    .related-section h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--ink);margin-bottom:1rem}
    .related-pub{padding:.8rem 0;border-bottom:1px solid var(--border);font-size:.9rem;color:var(--ink2)}
    .related-pub:last-child{border-bottom:none}

    /* LINKS */
    .project-links{display:flex;gap:1rem;flex-wrap:wrap;margin:2rem 0}
    .project-link-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.4rem;border-radius:6px;font-size:.9rem;font-weight:500;transition:all var(--t)}
    .project-link-btn.primary{background:var(--accent);color:#fff}
    .project-link-btn.primary:hover{background:var(--accent2);transform:translateY(-2px)}
    .project-link-btn.outline{border:1.5px solid var(--border);color:var(--ink2)}
    .project-link-btn.outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}

    /* FOOTER */
    footer{padding:2rem clamp(1.5rem,8vw,8rem);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;color:var(--ink2);font-size:.85rem;margin-top:4rem}

    /* LOADING */
    #loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;transition:opacity .5s}
    #loading.done{opacity:0;pointer-events:none}
    .loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){
      .project-hero{height:45vw;min-height:250px}
      .lightbox-nav{display:none}
    }
  </style>
</head>
<body>
<div id="loading"><div class="loader"></div></div>

<nav id="navbar">
  <a class="nav-logo" href="/">Diwakar Adhikari</a>
  <div class="nav-right">
    <a class="back-btn" href="/#projects">← All Projects</a>
    <button class="theme-btn" id="theme-btn">🌙</button>
  </div>
</nav>

<div id="project-hero" class="project-hero">
  <div class="project-hero-placeholder">🔬</div>
</div>

<div class="project-content">
  <div class="project-meta-bar" id="project-meta-bar"></div>
  <h1 class="project-title-main" id="project-title"></h1>
  <p class="project-short" id="project-short"></p>
  <div class="project-detail" id="project-detail"></div>
  <div id="project-video"></div>
  <div id="project-gallery"></div>
  <div id="project-report"></div>
  <div id="project-related"></div>
  <div class="project-links" id="project-links"></div>
</div>

<footer>
  <span style="font-family:'Playfair Display',serif">Diwakar Adhikari</span>
  <a href="/" style="color:var(--accent)">← Back to portfolio</a>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lb-close">✕</button>
  <button class="lightbox-nav lightbox-prev" id="lb-prev">‹</button>
  <img id="lb-img" src="" alt=""/>
  <button class="lightbox-nav lightbox-next" id="lb-next">›</button>
  <div class="lightbox-caption" id="lb-caption"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── GET SLUG FROM URL ────────────────────────────────────────
const slug = new URLSearchParams(location.search).get('slug') ||
             location.pathname.replace('/projects/','').replace('.html','').replace('/','');

// ── THEME ────────────────────────────────────────────────────
const themeBtn = document.getElementById('theme-btn');
const saved = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', saved);
themeBtn.textContent = saved === 'dark' ? '☀️' : '🌙';
themeBtn.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
});

// ── PARSE FRONTMATTER ────────────────────────────────────────
function parseFrontmatter(text) {
  const match = text.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return { data: {}, content: text };
  const data = {};
  const lines = match[1].split('\n');
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    const colonIdx = line.indexOf(':');
    if (colonIdx === -1) { i++; continue; }
    const key = line.slice(0, colonIdx).trim();
    const val = line.slice(colonIdx + 1).trim();
    if (val === '' || val === '[]') {
      // Check if next lines are list items
      const items = [];
      i++;
      while (i < lines.length && lines[i].startsWith('- ')) {
        const item = lines[i].slice(2).trim();
        if (item.startsWith('{')) {
          try { items.push(JSON.parse(item)); } catch(e) { items.push(item); }
        } else {
          items.push(item.replace(/^["']|["']$/g, ''));
        }
        i++;
      }
      data[key] = items;
      continue;
    } else if (val.startsWith('[')) {
      try {
        data[key] = JSON.parse(val);
      } catch(e) {
        data[key] = val.replace(/[\[\]"]/g,'').split(',').map(s=>s.trim()).filter(Boolean);
      }
    } else {
      data[key] = val.replace(/^["']|["']$/g, '');
    }
    i++;
  }
  const content = text.slice(match[0].length).trim();
  return { data, content };
}

// ── YOUTUBE EMBED ────────────────────────────────────────────
function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

// ── LIGHTBOX ─────────────────────────────────────────────────
let lbImages = [], lbIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbCap = document.getElementById('lb-caption');

function openLightbox(images, index) {
  lbImages = images; lbIndex = index;
  updateLightbox();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function updateLightbox() {
  const item = lbImages[lbIndex];
  lbImg.src = typeof item === 'string' ? item : item.src;
  lbCap.textContent = typeof item === 'object' && item.caption ? item.caption : '';
}
function closeLightbox() { lb.classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('lb-close').addEventListener('click', closeLightbox);
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.getElementById('lb-prev').addEventListener('click', () => { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; updateLightbox(); });
document.getElementById('lb-next').addEventListener('click', () => { lbIndex = (lbIndex + 1) % lbImages.length; updateLightbox(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbIndex = (lbIndex-1+lbImages.length)%lbImages.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex+1)%lbImages.length; updateLightbox(); }
});

// ── LOAD PROJECT ─────────────────────────────────────────────
async function loadProject() {
  try {
    const filename = slug.endsWith('.md') ? slug : slug + '.md';
    const res = await fetch(`/content/projects/${filename}`);
    if (!res.ok) throw new Error('Not found');
    const text = await res.text();
    const { data: p, content } = parseFrontmatter(text);

    document.title = `${p.title} — Diwakar Adhikari`;

    // Hero
    const heroEl = document.getElementById('project-hero');
    if (p.image) {
      heroEl.innerHTML = `
        <img class="project-hero-img" src="${p.image}" alt="${p.title}"/>
        <div class="project-hero-overlay"></div>
        <div class="project-hero-text">
          <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.8rem">
            ${(p.tags||[]).map(t=>`<span class="project-tag" style="background:rgba(255,255,255,.2);color:#fff">${t}</span>`).join('')}
          </div>
        </div>`;
    } else {
      const icons = {Research:'🔬',Program:'📋',Hydrology:'💧','Climate Change':'🌍',Sediment:'🪨',Hydropower:'⚡',Pollution:'⚠️','Water Quality':'🧪','Field Work':'🏔️','Food Systems':'🌾','Waste Management':'♻️'};
      const icon = icons[(p.tags||[])[0]] || '📁';
      heroEl.innerHTML = `<div class="project-hero-placeholder">${icon}</div>`;
    }

    // Meta bar
    const tags = (p.tags||[]).map(t=>`<span class="project-tag">${t}</span>`).join('');
    document.getElementById('project-meta-bar').innerHTML = `
      <span class="project-year">${p.year||''}</span>
      <span class="project-status-badge">${p.status||''}</span>
      ${tags}`;

    // Title & short desc
    document.getElementById('project-title').textContent = p.title || '';
    document.getElementById('project-short').textContent = p.shortDesc || '';

    // Detail (markdown)
    document.getElementById('project-detail').innerHTML = content
      ? marked.parse(content)
      : '';

    // Video
    const vidId = getYouTubeId(p.videoUrl);
    if (vidId) {
      document.getElementById('project-video').innerHTML = `
        <div class="video-section">
          <h3>Video</h3>
          <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe>
          </div>
        </div>`;
    }

    // Gallery
    const gallery = p.gallery || [];
    if (gallery.length > 0) {
      const items = gallery.map((g, i) => {
        const src = typeof g === 'string' ? g : (g.src || g);
        const cap = typeof g === 'object' ? (g.caption || '') : '';
        return `
          <div class="gallery-item" data-index="${i}">
            <img src="${src}" alt="${cap || 'Gallery image ' + (i+1)}" loading="lazy"/>
            ${cap ? `<div class="gallery-caption">${cap}</div>` : ''}
          </div>`;
      }).join('');
      document.getElementById('project-gallery').innerHTML = `
        <div class="gallery-section">
          <h3>Gallery</h3>
          <div class="gallery-grid">${items}</div>
        </div>`;
      document.querySelectorAll('.gallery-item').forEach((el, i) => {
        el.addEventListener('click', () => openLightbox(gallery, i));
      });
    }

    // Report
    if (p.report && p.report.file) {
      document.getElementById('project-report').innerHTML = `
        <div class="report-section">
          <a class="report-btn" href="${p.report.file}" download target="_blank">
            📄 ${p.report.label || 'Download Report'}
          </a>
        </div>`;
    }

    // Related publications
    const rp = p.relatedPubs || [];
    if (rp.length > 0) {
      const pubs = rp.map(pub => `<div class="related-pub">📚 ${pub}</div>`).join('');
      document.getElementById('project-related').innerHTML = `
        <div class="related-section">
          <h3>Related Publications</h3>
          ${pubs}
        </div>`;
    }

    // Links
    const linksEl = document.getElementById('project-links');
    if (p.link) {
      linksEl.innerHTML += `<a class="project-link-btn primary" href="${p.link}" target="_blank">View on GitHub ↗</a>`;
    }
    linksEl.innerHTML += `<a class="project-link-btn outline" href="/#projects">← Back to Projects</a>`;

  } catch(e) {
    document.querySelector('.project-content').innerHTML = `
      <div style="text-align:center;padding:4rem;color:var(--ink2)">
        <p style="font-size:3rem;margin-bottom:1rem">🔍</p>
        <h2 style="font-family:'Playfair Display',serif;margin-bottom:1rem">Project not found</h2>
        <a href="/#projects" style="color:var(--accent)">← Back to all projects</a>
      </div>`;
  } finally {
    document.getElementById('loading').classList.add('done');
  }
}

loadProject();
</script>
</body>
</html>
