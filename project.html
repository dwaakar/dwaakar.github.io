<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project — Diwakar Adhikari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root{--bg:#f7f5f0;--bg2:#eeeae2;--surface:#fff;--border:#ddd9d0;--ink:#1a1814;--ink2:#5a5650;--accent:#2d6a4f;--accent2:#40916c;--gold:#b7832a;--tag-bg:#e8f5ee;--tag-ink:#1b4332;--radius:10px;--shadow:0 2px 16px rgba(0,0,0,.07);--shadow-lg:0 8px 40px rgba(0,0,0,.12);--nav-h:64px;--t:0.3s cubic-bezier(.4,0,.2,1)}
    [data-theme="dark"]{--bg:#111410;--bg2:#1a1d17;--surface:#20241e;--border:#2e332b;--ink:#e8e4dc;--ink2:#9a9890;--accent:#52b788;--accent2:#74c69d;--gold:#d4a94a;--tag-bg:#1b3a2e;--tag-ink:#95d5b2}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;overflow-x:hidden;transition:background var(--t),color var(--t)}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;border:none;background:none;font-family:inherit}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
    #navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1.5rem,5vw,4rem);background:var(--surface);box-shadow:var(--shadow);transition:background var(--t)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--ink)}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .back-btn{display:flex;align-items:center;gap:.5rem;font-size:.85rem;font-weight:500;color:var(--ink2);padding:.5rem 1rem;border:1.5px solid var(--border);border-radius:6px;transition:all var(--t)}
    .back-btn:hover{border-color:var(--accent);color:var(--accent)}
    .theme-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:1rem;transition:all var(--t);background:var(--surface)}
    .theme-btn:hover{border-color:var(--accent);color:var(--accent)}
    .project-hero{margin-top:var(--nav-h);position:relative;height:60vh;min-height:380px;overflow:hidden;background:var(--bg2)}
    .project-hero-img{width:100%;height:100%;object-fit:cover;display:block}
    .project-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,.05) 60%,transparent 100%)}
    .project-hero-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem}
    .project-content{max-width:860px;margin:0 auto;padding:4rem clamp(1.5rem,5vw,5rem)}
    .project-meta-bar{display:flex;gap:.8rem;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem}
    .project-year{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--ink2);letter-spacing:.08em}
    .project-status-badge{font-size:.75rem;padding:.25rem .7rem;border-radius:12px;background:var(--tag-bg);color:var(--tag-ink);font-weight:500}
    .project-tag{font-size:.75rem;padding:.2rem .6rem;border-radius:12px;background:var(--tag-bg);color:var(--tag-ink)}
    .project-org{font-size:.85rem;color:var(--accent)}
    .project-title-main{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);line-height:1.15;color:var(--ink);margin-bottom:1.2rem;letter-spacing:-.01em}
    .project-short{font-size:1.05rem;color:var(--ink2);line-height:1.8;margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:1px solid var(--border)}
    .section-label{font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin:2.5rem 0 1rem;padding-top:2rem;border-top:1px solid var(--border)}
    .project-detail{font-size:1rem;color:var(--ink2);line-height:1.9}
    .project-detail p{margin-bottom:1.2rem}
    .project-detail h1,.project-detail h2,.project-detail h3{font-family:'Cormorant Garamond',serif;color:var(--ink);margin:2rem 0 .8rem;line-height:1.2}
    .project-detail h2{font-size:1.6rem}.project-detail h3{font-size:1.3rem}
    .project-detail ul,.project-detail ol{padding-left:1.5rem;margin-bottom:1.2rem}
    .project-detail li{margin-bottom:.4rem}
    .project-detail blockquote{border-left:3px solid var(--accent);padding:1rem 1.5rem;background:var(--bg2);border-radius:0 var(--radius) var(--radius) 0;margin:1.5rem 0;font-style:italic}
    .project-detail strong{color:var(--ink)}
    .project-detail a{color:var(--accent);text-decoration:underline}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
    .gallery-item{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;aspect-ratio:4/3;background:var(--bg2)}
    .gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform var(--t)}
    .gallery-item:hover img{transform:scale(1.04)}
    .gallery-cap{position:absolute;bottom:0;left:0;right:0;padding:.5rem .8rem;background:rgba(0,0,0,.55);color:#fff;font-size:.78rem;opacity:0;transition:opacity var(--t)}
    .gallery-item:hover .gallery-cap{opacity:1}
    .video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--radius);box-shadow:var(--shadow-lg)}
    .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
    .report-btn{display:inline-flex;align-items:center;gap:.6rem;padding:.9rem 1.8rem;background:var(--accent);color:#fff;border-radius:8px;font-size:.95rem;font-weight:500;transition:all var(--t)}
    .report-btn:hover{background:var(--accent2);transform:translateY(-2px)}
    .related-pub{padding:.8rem 0;border-bottom:1px solid var(--border);font-size:.9rem;color:var(--ink2)}
    .related-pub:last-child{border-bottom:none}
    .project-links{display:flex;gap:1rem;flex-wrap:wrap;margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border)}
    .link-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.4rem;border-radius:6px;font-size:.9rem;font-weight:500;transition:all var(--t)}
    .link-btn.primary{background:var(--accent);color:#fff}.link-btn.primary:hover{background:var(--accent2);transform:translateY(-2px)}
    .link-btn.outline{border:1.5px solid var(--border);color:var(--ink2)}.link-btn.outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
    .lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--t)}
    .lightbox.open{opacity:1;pointer-events:all}
    .lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px}
    .lb-close{position:absolute;top:1.5rem;right:1.5rem;color:#fff;width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all var(--t)}
    .lb-close:hover{background:rgba(255,255,255,.1)}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;width:48px;height:48px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:1.5rem;transition:all var(--t)}
    .lb-nav:hover{background:rgba(255,255,255,.1)}
    .lb-prev{left:1.5rem}.lb-next{right:1.5rem}
    .lb-caption{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.85);font-size:.9rem;text-align:center;max-width:80vw}
    .lb-counter{position:absolute;top:1.5rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.65);font-family:'JetBrains Mono',monospace;font-size:.8rem}
    footer{padding:2rem clamp(1.5rem,8vw,8rem);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;color:var(--ink2);font-size:.85rem;margin-top:2rem}
    #loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;transition:opacity .5s}
    #loading.done{opacity:0;pointer-events:none}
    .loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:768px){.project-hero{height:50vw;min-height:220px}.lb-nav{display:none}}
  </style>
</head>
<body>
<div id="loading"><div class="loader"></div></div>

<nav id="navbar">
  <a class="nav-logo" href="/">Diwakar Adhikari</a>
  <div class="nav-right">
    <a class="back-btn" href="/#projects">← All Projects</a>
    <button class="theme-btn" id="theme-btn">🌙</button>
  </div>
</nav>

<div id="project-hero" class="project-hero">
  <div class="project-hero-placeholder">📁</div>
</div>

<div class="project-content">
  <div id="project-meta-bar" class="project-meta-bar"></div>
  <h1 id="project-title" class="project-title-main"></h1>
  <p id="project-short" class="project-short"></p>
  <div id="project-body"></div>
  <div id="project-gallery"></div>
  <div id="project-video"></div>
  <div id="project-report"></div>
  <div id="project-related"></div>
  <div id="project-links" class="project-links"></div>
</div>

<footer>
  <span style="font-family:'Cormorant Garamond',serif;font-size:1rem">Diwakar Adhikari</span>
  <a href="/#projects" style="color:var(--accent);font-size:.88rem">← Back to portfolio</a>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <button class="lb-nav lb-prev" id="lb-prev">‹</button>
  <img id="lb-img" src="" alt=""/>
  <button class="lb-nav lb-next" id="lb-next">›</button>
  <div class="lb-caption" id="lb-caption"></div>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
// Theme
const themeBtn = document.getElementById('theme-btn');
const saved = localStorage.getItem('theme')||'light';
document.documentElement.setAttribute('data-theme', saved);
themeBtn.textContent = saved==='dark'?'☀️':'🌙';
themeBtn.addEventListener('click',()=>{
  const n = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('theme',n);
  themeBtn.textContent = n==='dark'?'☀️':'🌙';
});

// Frontmatter parser — handles nested gallery objects
function parseFM(text) {
  const m = text.match(/^---\n([\s\S]*?)\n---/);
  if (!m) return { data:{}, content:text };
  const data = {};
  const lines = m[1].split('\n');
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    const ci = line.indexOf(':');
    if (ci === -1) { i++; continue; }
    const key = line.slice(0,ci).trim();
    const val = line.slice(ci+1).trim();
    if (val===''||val==='[]') {
      const items=[]; i++;
      while (i < lines.length && (lines[i].startsWith('- ') || lines[i].startsWith('  '))) {
        if (lines[i].startsWith('- ')) {
          const itemVal = lines[i].slice(2).trim();
          if (itemVal==='' || itemVal.startsWith('#')) {
            // Multi-line object
            const obj={}; i++;
            while (i < lines.length && lines[i].startsWith('  ')) {
              const ol = lines[i].trim();
              const oci = ol.indexOf(':');
              if (oci!==-1) {
                const ok=ol.slice(0,oci).trim();
                const ov=ol.slice(oci+1).trim().replace(/^["']|["']$/g,'');
                obj[ok]=ov;
              }
              i++;
            }
            if (Object.keys(obj).length) items.push(obj);
            continue;
          } else {
            items.push(itemVal.replace(/^["']|["']$/g,''));
          }
        }
        i++;
      }
      data[key]=items; continue;
    }
    if (val.startsWith('[')) {
      try{data[key]=JSON.parse(val);}catch(e){data[key]=val.replace(/[\[\]"]/g,'').split(',').map(s=>s.trim()).filter(Boolean);}
    } else {
      data[key]=val.replace(/^["']|["']$/g,'');
    }
    i++;
  }
  return { data, content: text.slice(m[0].length).trim() };
}

// Image path normaliser
function imgPath(p) {
  if (!p) return '';
  if (p.startsWith('http')) return p;
  if (p.startsWith('/public/')) return p;
  if (p.startsWith('public/')) return '/' + p;
  if (p.startsWith('/images/')) return '/public' + p;
  if (p.startsWith('images/')) return '/public/' + p;
  return p;
}

// Lightbox
let lbImgs=[],lbIdx=0;
const lb=document.getElementById('lightbox');
function openLB(imgs,idx){lbImgs=imgs;lbIdx=idx;updateLB();lb.classList.add('open');document.body.style.overflow='hidden';}
function updateLB(){
  const g=lbImgs[lbIdx];
  document.getElementById('lb-img').src=typeof g==='string'?g:(g.src||'');
  document.getElementById('lb-caption').textContent=typeof g==='object'&&g.caption?g.caption:'';
  document.getElementById('lb-counter').textContent=lbImgs.length>1?`${lbIdx+1} / ${lbImgs.length}`:'';
}
function closeLB(){lb.classList.remove('open');document.body.style.overflow='';}
document.getElementById('lb-close').addEventListener('click',closeLB);
lb.addEventListener('click',e=>{if(e.target===lb)closeLB();});
document.getElementById('lb-prev').addEventListener('click',()=>{lbIdx=(lbIdx-1+lbImgs.length)%lbImgs.length;updateLB();});
document.getElementById('lb-next').addEventListener('click',()=>{lbIdx=(lbIdx+1)%lbImgs.length;updateLB();});
document.addEventListener('keydown',e=>{
  if(!lb.classList.contains('open'))return;
  if(e.key==='Escape')closeLB();
  if(e.key==='ArrowLeft'){lbIdx=(lbIdx-1+lbImgs.length)%lbImgs.length;updateLB();}
  if(e.key==='ArrowRight'){lbIdx=(lbIdx+1)%lbImgs.length;updateLB();}
});

// Load project
async function load() {
  try {
    const slug = new URLSearchParams(location.search).get('slug')||'';
    const fname = slug.endsWith('.md')?slug:slug+'.md';
    const res = await fetch(`/content/projects/${fname}`);
    if (!res.ok) throw new Error('Not found');
    const {data:p, content} = parseFM(await res.text());

    document.title = `${p.title||'Project'} — Diwakar Adhikari`;

    // Hero
    const heroEl = document.getElementById('project-hero');
    if (p.image) {
      heroEl.innerHTML=`<img class="project-hero-img" src="${imgPath(p.image)}" alt="${p.title||''}"/><div class="project-hero-overlay"></div>`;
    } else {
      const icons={Hydrology:'💧','Climate Change':'🌍',Sediment:'🪨',Hydropower:'⚡',Pollution:'⚠️','Water Quality':'🧪','Field Work':'🏔️','Food Systems':'🌾','Waste Management':'♻️'};
      const tags=Array.isArray(p.tags)?p.tags:[];
      heroEl.innerHTML=`<div class="project-hero-placeholder">${icons[tags[0]]||'📁'}</div>`;
    }

    // Meta
    const tags=Array.isArray(p.tags)?p.tags:[];
    document.getElementById('project-meta-bar').innerHTML=
      `${p.year?`<span class="project-year">${p.year}</span>`:''}
       ${p.status?`<span class="project-status-badge">${p.status}</span>`:''}
       ${p.organisation?`<span class="project-org">🏢 ${p.organisation}</span>`:''}
       ${tags.map(t=>`<span class="project-tag">${t}</span>`).join('')}`;

    document.getElementById('project-title').textContent=p.title||'';
    const se=document.getElementById('project-short');
    if(p.shortDesc){se.textContent=p.shortDesc;}else{se.style.display='none';}

    // Body
    if(content) document.getElementById('project-body').innerHTML=`<div class="project-detail">${marked.parse(content)}</div>`;

    // Gallery — normalise all possible formats from CMS
    const rawG=Array.isArray(p.gallery)?p.gallery:[];
    const gallery=rawG.map(g=>{
      if(typeof g==='string') return {src:imgPath(g),caption:''};
      // Handle {src: "...", caption: "..."} objects
      if(g.src) return {src:imgPath(g.src),caption:g.caption||''};
      return null;
    }).filter(Boolean);

    if(gallery.length>0){
      const items=gallery.map((g,i)=>`
        <div class="gallery-item" data-i="${i}">
          <img src="${g.src}" alt="${g.caption||'Image '+(i+1)}" loading="lazy"/>
          ${g.caption?`<div class="gallery-cap">${g.caption}</div>`:''}
        </div>`).join('');
      document.getElementById('project-gallery').innerHTML=
        `<div class="section-label">Gallery</div><div class="gallery-grid">${items}</div>`;
      document.querySelectorAll('.gallery-item').forEach((el,i)=>{
        el.addEventListener('click',()=>openLB(gallery,i));
      });
    }

    // Video
    if(p.videoUrl){
      const vid=p.videoUrl.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
      if(vid) document.getElementById('project-video').innerHTML=
        `<div class="section-label">Video</div><div class="video-wrap"><iframe src="https://www.youtube.com/embed/${vid[1]}" allowfullscreen></iframe></div>`;
    }

    // Report
    if(p.report&&p.report.file) document.getElementById('project-report').innerHTML=
      `<div class="section-label">Report</div><a class="report-btn" href="${p.report.file}" download target="_blank">📄 ${p.report.label||'Download Report'}</a>`;

    // Related pubs
    const rp=Array.isArray(p.relatedPubs)?p.relatedPubs:[];
    if(rp.length) document.getElementById('project-related').innerHTML=
      `<div class="section-label">Related Publications</div>${rp.map(pub=>`<div class="related-pub">📚 ${pub}</div>`).join('')}`;

    // Links
    const le=document.getElementById('project-links');
    if(p.link) le.innerHTML+=`<a class="link-btn primary" href="${p.link}" target="_blank">View on GitHub ↗</a>`;
    le.innerHTML+=`<a class="link-btn outline" href="/#projects">← Back to Projects</a>`;

  } catch(e) {
    document.querySelector('.project-content').innerHTML=`
      <div style="text-align:center;padding:4rem;color:var(--ink2)">
        <p style="font-size:3rem;margin-bottom:1rem">🔍</p>
        <h2 style="font-family:'Cormorant Garamond',serif;margin-bottom:1rem">Project not found</h2>
        <a href="/#projects" style="color:var(--accent)">← Back to all projects</a>
      </div>`;
  } finally {
    document.getElementById('loading').classList.add('done');
  }
}
load();
</script>
</body>
</html>
